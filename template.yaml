AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: nodejs20.x

Resources:
  VentasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Ventas
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  CreateSaleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/sales/createSale.handler
      Events:
        Api:
          Type: Api
          Properties:
            Path: /sales
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VentasTable
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/test/getHelloWorld.handler
      Events:
        Api:
          Type: Api
          Properties:
            Path: /hello
            Method: GET